events {
    worker_connections 1024;
}

http {
    # Cache configuration
    proxy_cache_path /var/cache/nginx/tiles 
                     levels=1:2 
                     keys_zone=tiles_cache:100m 
                     max_size=10g 
                     inactive=30d 
                     use_temp_path=off;

    # Upstream tile server
    upstream tileserver {
        server tileserver-gl:8080;
        keepalive 32;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types application/json application/x-protobuf image/png;

    server {
        listen 80;
        server_name localhost;

        # Increase buffer sizes for large responses
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Logging
        access_log /var/log/nginx/tiles_access.log;
        error_log /var/log/nginx/tiles_error.log warn;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Tile endpoints - with aggressive caching
        location ~* \.(png|jpg|jpeg|pbf|mvt)$ {
            proxy_pass http://tileserver;
            
            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Caching
            proxy_cache tiles_cache;
            proxy_cache_valid 200 30d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_lock on;
            proxy_cache_background_update on;
            
            # Cache headers
            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=2592000"; # 30 days
            
            # CORS headers
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range, Content-Type";
            
            # Handle OPTIONS requests
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods "GET, OPTIONS";
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type 'text/plain charset=UTF-8';
                add_header Content-Length 0;
                return 204;
            }
            
            # Keep-alive
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Metadata endpoints - shorter cache
        location ~* \.(json)$ {
            proxy_pass http://tileserver;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            proxy_cache tiles_cache;
            proxy_cache_valid 200 1h;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=3600";
            
            # CORS
            add_header Access-Control-Allow-Origin *;
        }

        # All other requests
        location / {
            proxy_pass http://tileserver;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # CORS
            add_header Access-Control-Allow-Origin *;
        }
    }
}

